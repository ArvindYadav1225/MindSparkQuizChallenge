<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MindSpark Quiz</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>

body{
height:100vh;
margin:0;
display:flex;
flex-direction:column;

background-image:url("images/selectsubjectimage.png");
background-size:cover;
background-position:center;
font-family: Inter;font-size: 18px;font-weight:1000"
}
a{
  color:black;
  text-decoration:none;
}
.top-bar{
position:absolute;
top:15px;
left:20px;
right:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.settings{

color:black;
padding:10px;
border-radius:10px;
font-size:22px;
}

.user-box{
background:rgba(255,255,255,0.5);
padding:8px 15px;
border-radius:20px;
display:flex;
align-items:center;
gap:10px;
}

.user-box img{
width:35px;
height:35px;
border-radius:50%;
}

.user-name{
font-weight:600;
font-size:14px;
}

.score{
font-size:12px;
color:#555;
}

/* Top Navbar */
.topbar{

padding:10px 20px;

display:flex;
justify-content:space-between;
align-items:center;
}

.username{
font-weight:bold;
font-size:18px;
}

.profile i{
font-size:28px;
color:#555;
cursor:pointer;
}

/* Subject Cards */

.subject-card{
background:white;
border-radius:10px;
padding:3px;
text-align:center;
transition:0.3s;
cursor:pointer;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.subject-card:hover{
transform:translateY(-6px);
background:#e9f2ff;
}

.subject-card i{
font-size:40px;
color:#0d6efd;
margin-bottom:10px;
}

.subject-card h5{
font-size:16px;
}
.bottom-menu{
position:fixed;
bottom:1%;
left:50%;
transform:translateX(-50%);
width:97%;

border-radius:20px;
display:flex;
justify-content:space-around;
align-items:center;
padding:0px 5px;
box-shadow:0 5px 20px rgba(0,0,0,0.25);
backdrop-filter: blur(10px);
z-index:1000;
}

/* Buttons */
.menu-btn{
flex:1;
text-align:center;
color:black;
font-size:12px;
cursor:pointer;
transition:0.3s;
}

.menu-btn i{
display:block;
font-size:22px;
margin-bottom:3px;
}

/* Hover Effect */
.menu-btn:hover{
color:#ff7a00;
transform:scale(1.1);
}

/* Click Effect */
.menu-btn:active{
transform:scale(0.95);
}


/* Dropdown */

.subject-select{
max-width:400px;
margin:auto;
}

</style>
</head>

<body>

<!-- Top Bar -->
<div class="top-bar">

<div class="settings">
<i class="bi bi-gear"></i>
</div>

<div class="user-box">
<div>
<div class="user-name" th:text="${user.userName}"></div>
<div class="score"  th:text="'Score: '+${user.score==null?'0':'user.score'}"></div>
</div>
<a th:href="@{/profile}"><i class="bi bi-person-circle" style="font-size:30px;"></i></a>
</div>

</div>



<div class="container mt-4">

<h3 class="text-center mb-4" style="font-family: Inter;font-size: 18px;font-weight:1000;margin-top:20%">Select Quiz Subject</h3>

<!-- Dropdown -->


<!-- Subjects Grid -->

<div class="row g-4">

<div class="col-md-3 col-4">
<div class="subject-card"><a th:href="@{/noQuestion/Hindi}">
<i class="bi bi-translate"></i><br>Hindi</a>
</div>
</div>

<div class="col-md-3 col-4">

<div class="subject-card"><a th:href="@{/noQuestion/UP GK}"><i class="bi bi-globe"></i><br>
UP GK</a>
</div>
</div>

<div class="col-md-3 col-4">

<div class="subject-card"><a th:href="@{/noQuestion/Current Affairs}">
<i class="bi bi-newspaper"></i><br>
Current Affairs</a>
</div>
</div>

<div class="col-md-3 col-4">

<div class="subject-card"><a th:href="@{/noQuestion/Math}">
<i class="bi bi-calculator"></i><br>Math</a>
</div>
</div>

<div class="col-md-3 col-4">

<div class="subject-card"><a th:href="@{/noQuestion/Science}">
<i class="bi bi-lightbulb"></i><br>
Science</a>
</div>
</div>

<div class="col-md-3 col-4">

<div class="subject-card"><a th:href="@{/noQuestion/Social Science}"><i class="bi bi-globe"></i><br>
Social Science</a>
</div>
</div>

<div class="col-md-3 col-4">

<div class="subject-card"><a th:href="@{/noQuestion/Reasoning}">
<i class="bi bi-puzzle"></i><br>
Reasoning</a>
</div>
</div>

<div class="col-md-3 col-4">

<div class="subject-card"><a th:href="@{/noQuestion/Computer}">
<i class="bi bi-laptop"></i><br>
Computer</a>
</div>
</div>
<div class="col-md-3 col-4">

<div class="subject-card"><a th:href="@{/noQuestion/GK Fact}"><i class="bi bi-globe"></i><br>
GK Fact</a>
</div>
</div>
<div class="col-md-3 col-4">

<div class="subject-card"><a th:href="@{/noQuestion/Sports GK}">
<i class="bi bi-laptop"></i><br>
Sports GK</a>
</div>
</div>
<div class="col-md-3 col-4">

<div class="subject-card"><a th:href="@{/noQuestion/Programming}">
<i class="bi bi-laptop"></i><br>
Programming</a>
</div>
</div>
<div class="col-md-3 col-4">

<div class="subject-card">
<a th:href="@{/noQuestion/Award and Price}"><i class="bi bi-laptop"></i><br>
Award & Price</a>
</div>
</div>


</div>

</div>
<div class="bottom-menu">

<div class="menu-btn">
<i class="bi bi-person-plus-fill"></i>
Refer Friends
</div>

<div class="menu-btn">
<i class="bi bi-people-fill"></i>
Your Friends
</div>

<div class="menu-btn">
<i class="bi bi-search"></i>
Find Friends
</div>

<div class="menu-btn">
<i class="bi bi-box-arrow-right"></i>
Logout
</div>

</div>
</body>
</html>
