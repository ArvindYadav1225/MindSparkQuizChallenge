<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MindSpark Leaderboard</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>
body {
    background: linear-gradient(135deg, #1d2671, #c33764);
    color: white;
    font-family: 'Segoe UI', sans-serif;
}

.leaderboard-container {
    max-width: 900px;
    margin: 40px auto;
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 20px;
    backdrop-filter: blur(10px);
}

.title {
    text-align: center;
    font-size: 2.2rem;
    font-weight: bold;
    margin-bottom: 20px;
}

.player-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 18px;
    border-radius: 15px;
    margin-bottom: 12px;
    background: rgba(255,255,255,0.15);
    transition: 0.3s;
}

.player-card:hover {
    transform: scale(1.02);
    background: rgba(255,255,255,0.25);
}

.rank {
    font-size: 1.5rem;
    font-weight: bold;
    width: 50px;
}

.player-info {
    display: flex;
    align-items: center;
    gap: 15px;
}

.player-img {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: 2px solid white;
}

.username {
    font-size: 1.1rem;
    font-weight: 600;
}

.stats {
    text-align: right;
}

.score {
    font-weight: bold;
}

.rating {
    font-size: 0.9rem;
    color: #ffd700;
}

/* Top 3 special styling */
.top1 {
    background: linear-gradient(45deg, gold, orange);
    color: black;
}

.top2 {
    background: linear-gradient(45deg, silver, gray);
    color: black;
}

.top3 {
    background: linear-gradient(45deg, #cd7f32, brown);
    color: black;
}
</style>

</head>
<body>

<div class="leaderboard-container">

    <div class="title">
        <i class="bi bi-trophy-fill"></i> MindSpark Leaderboard
    </div>

    <!-- Player 1 -->
    <div th:each="user: ${users}">
     <div class="player-card top1">
        <div class="rank" >1</div>

        <div class="player-info">
            <img th:src="${user.image}" class="player-img">
            <div>
                <div class="username" th:text="${user.name}"></div>
                <div th:text="'Rating '+${user.rating}"><i class="bi bi-star-fill"></i></div>
            </div>
        </div>

        <div class="stats">
            <div class="score" th:text="'Score '+${user.score}"></div>
        </div>
    </div>
    
    </div>

    <!-- Player 2 -->
   

</div>

</body>
</html>
