<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MindSpark - Friends</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fb;
        }

        .friend-card {
            border-radius: 15px;
            transition: 0.3s;
        }

        .friend-card:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .profile-img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
        }

        .rating {
            color: gold;
        }
    </style>
</head>
<body>

<div class="container mt-4">
    <h2 class="mb-4 text-center">👥 My Friends</h2>

    <!-- Friend Card -->
   

    <!-- Duplicate Cards (Example Multiple Friends) -->

   <div th:each="friend:${friends}">
    <div class="card friend-card mb-3 p-3">
        <div class="d-flex align-items-center justify-content-between">

            <div class="d-flex align-items-center">
                <img src="https://via.placeholder.com/60" class="profile-img me-3">

                <div>
                    <h5 class="mb-0" th:text="${friend.userName}"></h5>
                    <small class="text-muted" th:text="'@'+${friend.name}"></small>

                    <div>
                        <span class="me-3" th:text="'Score: '+${friend.score}">
                            <i class="bi bi-trophy" ></i> 
                        </span>
                       
                    </div>
                </div>
            </div>

            <button class="btn btn-success">
                <i class="bi bi-chat-dots"></i> Message Now
            </button>

        </div>
    </div>
   
   </div>
</div>

</body>
</html>
