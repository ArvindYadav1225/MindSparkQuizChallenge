<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindSpark Change Password</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
    body {
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Segoe UI', sans-serif;
    }

    .card-box {
        background: white;
        padding: 35px;
        border-radius: 25px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.25);
        width: 100%;
        max-width: 420px;
        text-align: center;
        animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .card-box img {
        width: 120px;
        margin-bottom: 10px;
    }

    .form-control {
        border-radius: 12px;
    }

    .btn-save {
        background: #ff6a88;
        color: white;
        border-radius: 30px;
        padding: 10px;
        transition: 0.3s;
    }

    .btn-save:hover {
        background: #ff3c68;
    }

    .toggle-eye {
        cursor: pointer;
    }

</style>
</head>
<body>

<div class="card-box">

    <!-- Image -->
    <img src="https://cdn-icons-png.flaticon.com/512/3064/3064155.png" alt="Password Icon">

    <h3><i class="bi bi-lock-fill"></i> Change Password</h3>
    <p class="text-muted">Keep your account secure 🔐</p>
     <form th:action="@{/updatePassword}" method="post">
    <!-- Old Password -->
    <div class="input-group mb-3">
        <span class="input-group-text"><i class="bi bi-key"></i></span>
        <input type="password" id="oldPass" class="form-control" placeholder="Old Password" name="oldPassword"><span class="input-group-text toggle-eye">  <i class="bi bi-eye"></i></span>
        
    </div>
<small th:if="${invalidOldPassword=='yes'}"  style="color:red"> invalid passwors 
           
        </small>
    <!-- New Password -->
    <div class="input-group mb-3">
        <span class="input-group-text"><i class="bi bi-lock"></i></span>
        <input type="password" id="newPass" class="form-control" placeholder="New Password" name="newPassword">
        <span class="input-group-text toggle-eye" >
            <i class="bi bi-eye"></i>
        </span>
    </div>

    <!-- Confirm Password -->
    <div class="input-group mb-3">
        <span class="input-group-text"><i class="bi bi-shield-check"></i></span>
        <input type="password" id="confirmPass" class="form-control" placeholder="Confirm New Password" name="cNewPassword"><span class="input-group-text toggle-eye">  <i class="bi bi-eye"></i></span><br>
        <span  th:if="${newpasscpass=='yes'}" style="color:red" >Password and Confirm password did not match.
           
        </span>
    </div>

    <!-- Submit Button -->
    <button class="btn btn-save w-100" >
        <i class="bi bi-check-circle"></i> Update Password
    </button>
      </form>
    <p id="msg" class="mt-3"></p>

</div>

<script>
history.pushState(null, null, location.href);

//Listen for back button
window.onpopstate = function () {
 // Redirect wherever you want
 window.location.href = "/sendOtpPage";
};
function toggle(id, icon) {
    let input = document.getElementById(id);
    let i = icon.querySelector('i');

    if (input.type === "password") {
        input.type = "text";
        i.classList.remove("bi-eye");
        i.classList.add("bi-eye-slash");
    } else {
        input.type = "password";
        i.classList.remove("bi-eye-slash");
        i.classList.add("bi-eye");
    }
}


</script>

</body>
</html>
