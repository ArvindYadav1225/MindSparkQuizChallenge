<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Profile</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
        }

        .profile-card {
            max-width: 420px;
            margin: 50px auto;
            padding: 25px;
            border-radius: 15px;
            background: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .profile-container {
            position: relative;
            width: 110px;
            margin: auto;
        }

        .profile-icon {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: #e9ecef;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            color: #6c757d;
            overflow: hidden;
        }

        .camera-btn {
            position: absolute;
            bottom: 0;
            right: 0;
            background: #0d6efd;
            color: white;
            border-radius: 50%;
            padding: 8px;
            cursor: pointer;
        }

        .camera-btn:hover {
            background: #0b5ed7;
        }

        #fileInput {
            display: none;
        }

        .error-text {
            font-size: 12px;
            color: red;
        }

        .forgot-link {
            font-size: 13px;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="profile-card text-center">

    <!-- Profile Icon + Camera -->
    <div class="profile-container">
        <div class="profile-icon" id="profilePreview">
            <img th:src="${user.image}">
        </div>

        <label for="fileInput" class="camera-btn">
            <i class="bi bi-camera"></i>
        </label>
        <input type="file" id="fileInput" accept="image/*">
    </div>

    <h5 class="mt-3">Update Profile</h5>

    <form>

        <!-- Username -->
        <div class="mb-3 text-start">
            <label class="form-label"><i class="bi bi-person"></i> Username</label>
            <input type="text" class="form-control" placeholder="Enter username">
            <span class="error-text"></span>
        </div>

        <!-- Email -->
        <div class="mb-3 text-start">
            <label class="form-label"><i class="bi bi-envelope"></i> Email</label>
            <input type="email" class="form-control" placeholder="Enter email">
            <span class="error-text"></span>
        </div>

        <!-- Current Password (Verification) -->
        <div class="mb-2 text-start">
            <label class="form-label"><i class="bi bi-lock"></i> Enter Password</label>
            <input type="password" class="form-control" placeholder="Enter your password to update profile">
            <span class="error-text"></span>
        </div>

        <!-- Forgot Password -->
        <div class="text-end mb-3">
            <a th:href="@{/sendOtpPage}" class="forgot-link">Forgot Password?</a>
        </div>

        <!-- Buttons -->
        <div class="d-grid gap-2">
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-check-circle"></i> Update Profile
            </button>

            <button type="reset" class="btn btn-secondary">
                <i class="bi bi-arrow-clockwise"></i> Reset
            </button>
        </div>

    </form>
</div>

<!-- JS for Image Preview -->
