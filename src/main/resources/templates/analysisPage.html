<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mindspark Quiz Analysis</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(to right, #e3f2fd, #ffffff);
      font-family: 'Segoe UI', sans-serif;
    }

    .profile-card {
      background: white;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .profile-img {
      width: 70px;
      height: 70px;
      border-radius: 50%;
    }

    .quiz-title {
      font-weight: bold;
      font-size: 28px;
      color: #0d6efd;
    }

    .result-true {
      color: green;
      font-weight: bold;
    }

    .result-false {
      color: red;
      font-weight: bold;
    }

    .circle-score {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: conic-gradient(#28a745 216deg, #dee2e6 0deg);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .circle-inner {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: bold;
    }

    table {
      background: white;
      border-radius: 10px;
      overflow: hidden;
    }
  </style>
</head>
<body>

<div class="container mt-4">

  <!-- Profile Section -->
  <div class="profile-card d-flex align-items-center justify-content-between">
    <div class="d-flex align-items-center">
      <img src="https://i.pravatar.cc/150?img=3" class="profile-img me-3">
      <div>
        <h5 class="mb-0">Arvind Yadav</h5>
        <small class="text-muted">Quiz Player</small>
      </div>
    </div>
    <div class="quiz-title">🧠 Mindspark Quiz</div>
  </div>

  <!-- Score Circle -->
  <div class="mt-4 text-center">
    <div class="circle-score">
      <div class="circle-inner">
        6/10
      </div>
    </div>
    <p class="mt-2 text-success fw-bold">Correct Answers</p>
  </div>

  <!-- Quiz Table -->
  <div class="mt-4">
    <table class="table table-bordered text-center">
      <thead class="table-primary">
        <tr>
          <th>Question</th>
          <th>Your Answer</th>
          <th>Result</th>
          <th>Correct Answer</th>
        </tr>
      </thead>
      <tbody>

       <div th:each="quiz:${analysisResult}">
       
        <tr>
          <td th:text="${quiz.questionno}"></td>
          <td  th:text="${quiz.userOption}"></td>
          <td  th:text="${quiz.result}">
           
          </td>
          <td  th:text="${quiz.correctOption}"></td>
        </tr>
       </div>

        

      </tbody>
    </table>
  </div>

</div>
<script>
//Push current page into history
history.pushState(null, null, location.href);

// Listen for back button
window.onpopstate = function () {
    // Redirect wherever you want
    window.location.href = "/userhomepage";
};
</script>
</body>
</html>
