<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindSpark OTP Verification</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
    body {
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Segoe UI', sans-serif;
    }

    .otp-card {
        background: white;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        width: 100%;
        max-width: 420px;
        text-align: center;
    }

    .otp-card img {
        width: 120px;
        margin-bottom: 15px;
    }

    .otp-input {
        letter-spacing: 10px;
        font-size: 24px;
        text-align: center;
        font-weight: bold;
    }

    .btn-custom {
        background: #4facfe;
        color: white;
        border-radius: 30px;
        padding: 10px;
        transition: 0.3s;
    }

    .btn-custom:hover {
        background: #007bff;
    }

    .resend {
        cursor: pointer;
        color: #007bff;
        font-size: 14px;
    }

    .resend:hover {
        text-decoration: underline;
    }
</style>
</head>
<body>

<div class="otp-card">

    <!-- Logo / Image -->
    <img src="https://cdn-icons-png.flaticon.com/512/295/295128.png" alt="Mail Icon">

    <h3><i class="bi bi-shield-lock"></i> Verify Your Email</h3>
    <p class="text-muted">Enter the OTP sent to your Gmail</p>

    <!-- Email Input -->
    <div class="mb-3">
        <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" id="email" class="form-control" placeholder="Enter your Gmail">
            
        </div>
        <small style="color:red;display:none" id="validgmail"></small><br>
        <small style="color:red;display:none" id="validgmail2"></small>
    </div>

    <!-- Send OTP Button -->
    <button class="btn btn-custom w-100 mb-3" onclick="gmailverify()">
        <i class="bi bi-send"></i> Send OTP
    </button>

   

</div>

<script>
           
 async function gmailverify(){
	 let validgmail=document.getElementById("validgmail");
	 let validgmail2=document.getElementById("validgmail2");
	 let gmail=document.getElementById("email").value;
	 console.log(gmail);
	 const response = await fetch(`/sendOtp/${gmail}`);
	 const result = await response.json(); 
	 
	 if(result==false){
		   console.log(result);
		 validgmail.style.display="inline";
		 validgmail.textContent="Invalid gmail or not Registered";
		 validgmail2.style.display="inline";
		 validgmail2.textContent="please enter a valid gmail.";
	 }
	 else{
		 validgmail.style.display="none";
		 validgmail2.style.display="none";
	
		 window.location.href = "/verifyOtpPage";
			
		 
	 }
 }

</script>

</body>
</html>
