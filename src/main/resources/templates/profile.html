<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Profile</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .profile-card {
      width: 350px;
      border-radius: 20px;
      padding: 20px;
      background: #fff;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
      position: relative;
    }

    .profile-img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 5px solid #667eea;
      object-fit: cover;
    }

    .camera-btn {
      position: absolute;
      top: 90px;
      left: 55%;
      transform: translateX(-50%);
      background: #667eea;
      border-radius: 50%;
      padding: 8px;
      color: white;
      cursor: pointer;
    }

    .badge-custom {
      background: #28a745;
      color: #fff;
      padding: 6px 12px;
      border-radius: 15px;
      font-size: 13px;
    }

    .stats-box {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 10px;
      margin-top: 10px;
    }

    .btn-custom {
      background: #667eea;
      color: #fff;
      border-radius: 20px;
    }

    .btn-custom:hover {
      background: #5a67d8;
    }
  </style>
</head>

<body>

<div class="profile-card">

  <!-- Profile Image -->
  <img th:src="${user.image}" class="profile-img" id="profileImage">

  <!-- Camera Button -->
  <div class="camera-btn" data-bs-toggle="modal" data-bs-target="#imageModal">
    <i class="bi bi-camera"></i>
  </div>

  <!-- Username -->
  <h4 class="mt-3" th:text="${user.userName}"></h4>

  <!-- User Score Badge -->
  <span class="badge-custom">
    <i class="bi bi-trophy" th:text="' '+${user.score}"></i> 
  </span>

  <div class="mt-3 text-start">
    <p ><i class="bi bi-person" ></i> <b>Name:</b><span th:text="' '+${user.name}"></span></p>
    <p><i class="bi bi-envelope"></i> <b>Email:</b><span th:text="' '+${user.gmail}"></span></p>
  </div>

  <!-- Stats -->
  <div class="stats-box d-flex justify-content-around">
    <div>
      <h6>50</h6>
      <small>Quizzes</small>
    </div>
    <div>
      <h6>30</h6>
      <small>Wins</small>
    </div>
    <div>
      <h6>5</h6>
      <small>Rank</small>
    </div>
  </div>

  <!-- Buttons -->
  <div class="mt-3">
    <form th:action="@{/updateprofile}" method="get">
    <button class="btn btn-custom w-100 mb-2">
      <i class="bi bi-pencil-square"></i> Update Profile
    </button>
    </form>

   <form th:action="@{/updatePassword}"> <button class="btn btn-outline-danger w-100">
      <i class="bi bi-lock"></i> Update Password
    </button></form>
  </div>

</div>

<!-- Image Upload Modal -->
<div class="modal fade" id="imageModal">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5>Update Profile Image</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body text-center">
        <input type="file" id="imageInput" class="form-control">
      </div>

      <div class="modal-footer">
        <button class="btn btn-success" onclick="updateImage()">Save</button>
      </div>

    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
//Push current page into history
history.pushState(null, null, location.href);

// Listen for back button
window.onpopstate = function () {
    // Redirect wherever you want
    window.location.href = "/userhomepage";
};
  function updateImage() {
    let input = document.getElementById('imageInput');
    let image = document.getElementById('profileImage');

    if (input.files && input.files[0]) {
      let reader = new FileReader();

      reader.onload = function(e) {
        image.src = e.target.result;
      }

      reader.readAsDataURL(input.files[0]);
    }
  }
</script>

</body>
</html>
