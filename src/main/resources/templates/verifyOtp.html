<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindSpark OTP Verification</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
    body {
        background: linear-gradient(135deg, #667eea, #764ba2);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Segoe UI', sans-serif;
    }

    .otp-card {
        background: white;
        padding: 35px;
        border-radius: 25px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.25);
        width: 100%;
        max-width: 420px;
        text-align: center;
        animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .otp-card img {
        width: 130px;
        margin-bottom: 15px;
    }

    .otp-input {
        letter-spacing: 12px;
        font-size: 28px;
        text-align: center;
        font-weight: bold;
        border-radius: 12px;
    }

    .btn-verify {
        background: #28a745;
        color: white;
        border-radius: 30px;
        padding: 10px;
        transition: 0.3s;
    }

    .btn-verify:hover {
        background: #218838;
    }

    .btn-resend {
        background: transparent;
        border: none;
        color: #007bff;
        font-weight: 500;
        margin-top: 10px;
    }

    .btn-resend:hover {
        text-decoration: underline;
    }

    .timer {
        font-size: 14px;
        color: gray;
        margin-top: 8px;
    }

</style>
</head>
<body>

<div class="otp-card">

    <!-- Illustration -->
    <img src="https://cdn-icons-png.flaticon.com/512/3064/3064197.png" alt="OTP Icon">

    <h3><i class="bi bi-shield-check"></i> Enter OTP</h3>
    <p class="text-muted">We have sent a verification code to your email</p>

    <!-- OTP Input -->
    <div class="mb-3">
        <input type="text" maxlength="7" id="otp" class="form-control otp-input" placeholder="------" onclick="enterOTP()">
        <small style="color:red;display:none" id="otpverification"></small>
    </div>

    <!-- Verify Button -->
    <button class="btn btn-verify w-100" onclick="verifyOTP()">
        <i class="bi bi-check-circle"></i> Verify OTP
    </button>

    <!-- Timer -->
    <div class="timer" id="timer">Resend available in 30s</div>

    <!-- Resend Button -->
    <button class="btn-resend" id="resendBtn" onclick="resendOTP()">
        <i class="bi bi-arrow-repeat"></i> Resend OTP
    </button>

    <p id="message" class="mt-3"></p>

</div>

<script>
let otpverification=document.getElementById("otpverification");
function enterOTP(){
	
	
	otpverification.style.display="none";
	otpverification.textContent="a";
}
 async function resendOTP(){
	 let res=await fetch(`http://localhost:8080/generateOtp`)
	 
 }
let timeLeft = 180;
let timerDisplay = document.getElementById("timer");
let resendBtn = document.getElementById("resendBtn");

let countdown = setInterval(() => {
    timeLeft--;
    timerDisplay.innerText = "Resend available in " + timeLeft + "s";

    if (timeLeft <= 0) {
        clearInterval(countdown);
        timerDisplay.innerText = "You can resend OTP now";
        resendBtn.disabled = false;
    }
}, 1000);

async function verifyOTP() {
	
	let otp=document.getElementById("otp").value;
    let response=await fetch(`http://localhost:8080/otpVerification/${otp}`);
	// const response = await fetch(`http://localhost:8080/sendOtp/${gmail}`);
    let res=await response.json();
    if(res==false){
    	console.log(res);
    	otpverification.style.display="inline";
    	otpverification.textContent="Invalid OTP ❌"
    }
    else{
    	otpverification.style.display="inline";
    	otpverification.style.color= "green";
    	otpverification.textContent = "OTP Verified ✅";
    	 window.location.href = "/loginByGmail";
    }
}



</script>

</body>
</html>
